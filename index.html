<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IP Inspector — ip.hbenali.ovh</title>
  <meta name="description" content="Modern IP Inspector: IP lookup, DNS records, reverse DNS and more." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #03060f;
      --surface:   rgba(255,255,255,0.034);
      --border:    rgba(0,210,255,0.13);
      --border-h:  rgba(0,210,255,0.38);
      --cyan:      #00d4ff;
      --cyan-dim:  rgba(0,212,255,0.55);
      --cyan-glow: rgba(0,212,255,0.18);
      --green:     #00ffa3;
      --red:       #ff4d6d;
      --text:      #cdd8e3;
      --text-dim:  rgba(205,216,227,0.45);
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── GRID BACKGROUND ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,212,255,0.09) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── LAYOUT ── */
    .wrap { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 24px; }

    /* ── HEADER ── */
    header {
      padding: 48px 0 0;
      text-align: center;
      animation: fadeDown .7s ease both;
    }

    .logo-row {
      display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 6px;
    }

    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--cyan), #006aff);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px rgba(0,212,255,0.35);
      flex-shrink: 0;
    }

    .logo-icon svg { width: 22px; height: 22px; fill: #fff; }

    header h1 {
      font-family: var(--sans);
      font-size: clamp(1.7rem, 4vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
    }

    header h1 span { color: var(--cyan); }

    .tagline {
      font-size: 0.78rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── MY IP CARD ── */
    .my-ip-card {
      margin: 36px auto 0;
      max-width: 600px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 32px;
      backdrop-filter: blur(14px);
      box-shadow: 0 0 60px rgba(0,212,255,0.06), inset 0 1px 0 rgba(255,255,255,0.05);
      animation: fadeUp .7s .15s ease both;
    }

    .my-ip-label {
      font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 8px;
    }

    .my-ip-value {
      font-family: var(--sans);
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .my-ip-value.loading { color: var(--text-dim); font-size: 1.4rem; animation: pulse 1.4s infinite; }

    .my-ip-meta {
      display: flex; flex-wrap: wrap; gap: 20px; margin-top: 18px;
    }

    .ip-meta-item { display: flex; flex-direction: column; gap: 2px; }
    .ip-meta-item .k { font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); }
    .ip-meta-item .v { font-size: 0.83rem; color: var(--cyan); }

    /* ── TABS ── */
    .tabs { display: flex; gap: 6px; margin-top: 40px; animation: fadeUp .7s .25s ease both; }

    .tab-btn {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      padding: 12px 8px;
      border-radius: 10px;
      cursor: pointer;
      transition: all .2s;
      text-transform: uppercase;
    }

    .tab-btn:hover { border-color: var(--border-h); color: var(--text); }

    .tab-btn.active {
      background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,106,255,0.08));
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 20px rgba(0,212,255,0.12);
    }

    /* ── PANELS ── */
    .panel { display: none; animation: fadeUp .35s ease both; margin-top: 20px; }
    .panel.active { display: block; }

    /* ── SEARCH BOX ── */
    .search-row {
      display: flex; gap: 10px;
    }

    .search-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: #fff;
      font-family: var(--mono);
      font-size: 0.9rem;
      padding: 14px 18px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      backdrop-filter: blur(10px);
    }

    .search-input::placeholder { color: var(--text-dim); }

    .search-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
    }

    .search-btn {
      background: linear-gradient(135deg, var(--cyan), #006aff);
      border: none;
      border-radius: 10px;
      color: #000;
      font-family: var(--mono);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 14px 22px;
      cursor: pointer;
      transition: transform .15s, box-shadow .2s;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .search-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0,212,255,0.35); }
    .search-btn:active { transform: translateY(0); }

    /* ── RESULTS CARD ── */
    .result-card {
      margin-top: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      backdrop-filter: blur(14px);
      box-shadow: 0 0 40px rgba(0,212,255,0.04);
    }

    .result-card-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase;
    }

    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-cyan { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
    .dot-green { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .dot-red { background: var(--red); box-shadow: 0 0 8px var(--red); }
    .dot-gray { background: var(--text-dim); }

    /* ── DATA ROWS ── */
    .data-grid {
      display: grid;
      grid-template-columns: minmax(140px, 200px) 1fr;
    }

    .data-row {
      display: contents;
    }

    .data-row .dk, .data-row .dv {
      padding: 11px 20px;
      border-bottom: 1px solid rgba(0,212,255,0.05);
      font-size: 0.82rem;
    }

    .data-row:last-child .dk,
    .data-row:last-child .dv { border-bottom: none; }

    .dk { color: var(--text-dim); }
    .dv { color: #fff; word-break: break-all; }
    .dv.val-good { color: var(--green); }
    .dv.val-warn { color: #ffb347; }

    /* ── DNS TABLE ── */
    .dns-table { width: 100%; border-collapse: collapse; }
    .dns-table th {
      padding: 10px 20px; font-size: 0.65rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--text-dim);
      border-bottom: 1px solid var(--border); text-align: left;
    }
    .dns-table td {
      padding: 11px 20px; font-size: 0.82rem; border-bottom: 1px solid rgba(0,212,255,0.05);
      vertical-align: top; word-break: break-all;
    }
    .dns-table tr:last-child td { border-bottom: none; }
    .dns-table td:first-child { color: var(--cyan); }
    .dns-table td:last-child { color: #fff; }
    .dns-table td:nth-child(2) { color: var(--text-dim); font-size: 0.75rem; }

    /* ── DNS TYPE FILTERS ── */
    .type-filters {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; margin-bottom: 14px;
    }

    .type-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all .18s;
      text-transform: uppercase;
    }

    .type-pill:hover { border-color: var(--border-h); color: var(--text); }
    .type-pill.active { background: rgba(0,212,255,0.12); border-color: var(--cyan); color: var(--cyan); }

    /* ── STATUS / ERRORS ── */
    .status-msg {
      padding: 16px 20px;
      font-size: 0.82rem;
      color: var(--text-dim);
      text-align: center;
    }

    .error-msg {
      padding: 16px 20px;
      font-size: 0.82rem;
      color: var(--red);
      text-align: center;
    }

    /* ── LOADER ── */
    .loader {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,212,255,0.2);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }

    /* ── FLAG ── */
    .flag { font-size: 1.1em; }

    /* ── MAP PLACEHOLDER ── */
    .map-wrap {
      border-top: 1px solid var(--border);
      height: 180px;
      background: linear-gradient(180deg, rgba(0,212,255,0.03), rgba(0,106,255,0.02));
      display: flex; align-items: center; justify-content: center;
      color: var(--text-dim); font-size: 0.78rem; letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── FOOTER ── */
    footer {
      margin: 60px 0 32px;
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      animation: fadeUp .7s .4s ease both;
    }

    footer a { color: var(--cyan-dim); text-decoration: none; }
    footer a:hover { color: var(--cyan); }

    /* ── BADGE ── */
    .badge {
      display: inline-block;
      background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.2);
      color: var(--cyan);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      vertical-align: middle;
      margin-left: 8px;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown { from { opacity:0; transform: translateY(-16px); } to { opacity:1; transform: none; } }
    @keyframes fadeUp   { from { opacity:0; transform: translateY(16px);  } to { opacity:1; transform: none; } }
    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:.4; } }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .tabs { flex-wrap: wrap; }
      .tab-btn { flex: 1 1 40%; }
      .search-row { flex-direction: column; }
      .my-ip-meta { gap: 14px; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
        </svg>
      </div>
      <h1>IP <span>Inspector</span></h1>
    </div>
    <p class="tagline">ip.hbenali.ovh &mdash; Network Intelligence Tools</p>
  </header>

  <!-- MY IP CARD -->
  <div class="my-ip-card" id="myIpCard">
    <div class="my-ip-label">Your Current IP Address</div>
    <div class="my-ip-value loading" id="myIpVal">Resolving…</div>
    <div class="my-ip-meta" id="myIpMeta"></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('ip')">IP Lookup</button>
    <button class="tab-btn" onclick="switchTab('dns')">DNS Records</button>
    <button class="tab-btn" onclick="switchTab('rdns')">Reverse DNS</button>
    <button class="tab-btn" onclick="switchTab('whois')">ASN / Whois</button>
  </div>

  <!-- ── IP LOOKUP ── -->
  <div class="panel active" id="panel-ip">
    <div class="search-row">
      <input class="search-input" id="ipInput" type="text" placeholder="Enter IP address  (e.g. 1.1.1.1)" />
      <button class="search-btn" onclick="lookupIP()">Look up</button>
    </div>
    <div id="ipResult"></div>
  </div>

  <!-- ── DNS RECORDS ── -->
  <div class="panel" id="panel-dns">
    <div class="search-row">
      <input class="search-input" id="dnsInput" type="text" placeholder="Enter domain  (e.g. cloudflare.com)" />
      <button class="search-btn" onclick="lookupDNS()">Resolve</button>
    </div>
    <div class="type-filters" id="dnsFilters" style="display:none">
      <button class="type-pill active" onclick="filterDNS('ALL')">All</button>
      <button class="type-pill" onclick="filterDNS('A')">A</button>
      <button class="type-pill" onclick="filterDNS('AAAA')">AAAA</button>
      <button class="type-pill" onclick="filterDNS('MX')">MX</button>
      <button class="type-pill" onclick="filterDNS('TXT')">TXT</button>
      <button class="type-pill" onclick="filterDNS('NS')">NS</button>
      <button class="type-pill" onclick="filterDNS('CNAME')">CNAME</button>
      <button class="type-pill" onclick="filterDNS('SOA')">SOA</button>
      <button class="type-pill" onclick="filterDNS('CAA')">CAA</button>
    </div>
    <div id="dnsResult"></div>
  </div>

  <!-- ── REVERSE DNS ── -->
  <div class="panel" id="panel-rdns">
    <div class="search-row">
      <input class="search-input" id="rdnsInput" type="text" placeholder="Enter IP for PTR lookup  (e.g. 8.8.8.8)" />
      <button class="search-btn" onclick="lookupRDNS()">PTR Query</button>
    </div>
    <div id="rdnsResult"></div>
  </div>

  <!-- ── ASN / WHOIS ── -->
  <div class="panel" id="panel-whois">
    <div class="search-row">
      <input class="search-input" id="whoisInput" type="text" placeholder="IP or ASN  (e.g. 8.8.8.8 or AS15169)" />
      <button class="search-btn" onclick="lookupWhois()">Query ASN</button>
    </div>
    <div id="whoisResult"></div>
  </div>

  <footer>
    <p>ip.hbenali.ovh &mdash; All lookups are client-side &middot; No data stored &middot; Powered by open APIs</p>
    <p style="margin-top:6px"><a href="https://ip.hbenali.ovh">ip.hbenali.ovh</a></p>
  </footer>

</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   APIS USED (all CORS-enabled, no auth required)
   • https://api.ipify.org          — raw IP detection (unlimited)
   • https://ipwho.is/{ip}          — geo + ASN enrichment (10k/mo free)
   • https://dns.google/resolve     — DNS over HTTPS (generous)
═══════════════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);

function showLoading(el) {
  el.innerHTML = `<div class="result-card">
    <div class="status-msg"><span class="loader"></span>Querying…</div>
  </div>`;
}

function showError(el, msg) {
  el.innerHTML = `<div class="result-card">
    <div class="result-card-header"><div class="dot dot-red"></div>Error</div>
    <div class="error-msg">${msg}</div>
  </div>`;
}

function dataCard(title, dotClass, rows) {
  const rowsHTML = rows.map(([k,v,cls]) => `
    <div class="data-row">
      <div class="dk">${k}</div>
      <div class="dv${cls ? ' '+cls : ''}">${v ?? '—'}</div>
    </div>`).join('');
  return `<div class="result-card">
    <div class="result-card-header"><div class="dot ${dotClass}"></div>${title}</div>
    <div class="data-grid">${rowsHTML}</div>
  </div>`;
}

/* ── TAB SWITCHING ── */
function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  $('panel-' + tab).classList.add('active');
  event.currentTarget.classList.add('active');
}

/* ── FLAG EMOJI ── */
function flagEmoji(code) {
  if (!code || code.length !== 2) return '';
  return String.fromCodePoint(...[...code.toUpperCase()].map(c => 0x1F1E0 + c.charCodeAt(0) - 65));
}

/* ── GEO HELPER — ipwho.is ── */
async function geoLookup(ip) {
  const r = await fetch(`https://ipwho.is/${encodeURIComponent(ip)}`);
  const d = await r.json();
  if (!d.success) throw new Error(d.message || 'IP not found');
  return d;
}

/* ════════════════════════════════════════════════
   MY IP
════════════════════════════════════════════════ */
async function loadMyIP() {
  try {
    // api.ipify.org: tiny service, CORS ✅, no rate limit, returns {"ip":"x.x.x.x"}
    const ipRes = await fetch('https://api.ipify.org?format=json');
    const { ip } = await ipRes.json();
    const ipEl = $('myIpVal');
    ipEl.classList.remove('loading');
    ipEl.textContent = ip;
    $('ipInput').value = ip;

    // ipwho.is: full CORS support, Access-Control-Allow-Origin: *
    const d = await geoLookup(ip);
    const isp  = d.connection?.isp || d.connection?.org || '—';
    const flag = d.flag?.emoji || flagEmoji(d.country_code);

    $('myIpMeta').innerHTML = [
      ['Country',  `<span class="flag">${flag}</span> ${d.country || '—'}`],
      ['City',     d.city || '—'],
      ['ISP',      isp],
      ['Timezone', d.timezone?.id || '—'],
    ].map(([k,v]) => `
      <div class="ip-meta-item">
        <span class="k">${k}</span>
        <span class="v">${v}</span>
      </div>`).join('');
  } catch(e) {
    $('myIpVal').textContent = 'Unavailable';
  }
}

/* ════════════════════════════════════════════════
   IP LOOKUP
════════════════════════════════════════════════ */
async function lookupIP() {
  const ip = $('ipInput').value.trim();
  if (!ip) return;
  const el = $('ipResult');
  showLoading(el);
  try {
    const d = await geoLookup(ip);
    const flag = d.flag?.emoji || flagEmoji(d.country_code);
    const asn  = d.connection?.asn ? 'AS' + d.connection.asn : '—';

    el.innerHTML = dataCard('IP Intelligence — ' + d.ip, 'dot-cyan', [
      ['IP Address',   d.ip],
      ['Type',         d.type || '—'],
      ['Country',      d.country ? `${flag} ${d.country} (${d.country_code})` : '—'],
      ['Region',       d.region ? `${d.region} (${d.region_code})` : '—'],
      ['City',         d.city || '—'],
      ['Postal Code',  d.postal || '—'],
      ['Latitude',     d.latitude ?? '—'],
      ['Longitude',    d.longitude ?? '—'],
      ['Timezone',     d.timezone?.id || '—'],
      ['UTC Offset',   d.timezone?.utc || '—'],
      ['Calling Code', d.calling_code || '—'],
      ['Capital',      d.capital || '—'],
      ['ISP',          d.connection?.isp || '—'],
      ['Organisation', d.connection?.org || '—'],
      ['ASN',          asn],
      ['Domain',       d.connection?.domain || '—'],
    ]) + mapLink(d.latitude, d.longitude);
  } catch(e) {
    showError(el, e.message || 'Lookup failed.');
  }
}

function mapLink(lat, lon) {
  if (lat == null || lon == null) return '';
  return `<div class="map-wrap">
    <a href="https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}#map=10/${lat}/${lon}"
       target="_blank" rel="noopener"
       style="color:var(--cyan-dim);text-decoration:none;letter-spacing:.1em;font-size:.75rem;">
      ↗ Open on OpenStreetMap  (${(+lat).toFixed(4)}, ${(+lon).toFixed(4)})
    </a>
  </div>`;
}

$('ipInput').addEventListener('keydown', e => e.key === 'Enter' && lookupIP());

/* ════════════════════════════════════════════════
   DNS LOOKUP  — Google DoH  (CORS ✅, no auth)
════════════════════════════════════════════════ */
const DNS_TYPES = ['A','AAAA','MX','TXT','NS','CNAME','SOA','CAA','SRV','PTR'];
const TYPE_NUM  = {A:1,NS:2,CNAME:5,SOA:6,PTR:12,MX:15,TXT:16,AAAA:28,CAA:257,SRV:33};
const NUM_TYPE  = Object.fromEntries(Object.entries(TYPE_NUM).map(([k,v])=>[v,k]));

let allDnsRecords = [];
let activeDnsFilter = 'ALL';

async function lookupDNS() {
  const domain = $('dnsInput').value.trim().replace(/^https?:\/\//,'').split('/')[0];
  if (!domain) return;
  const el = $('dnsResult');
  showLoading(el);
  $('dnsFilters').style.display = 'none';
  allDnsRecords = [];

  try {
    const results = await Promise.allSettled(
      DNS_TYPES.map(t =>
        fetch(`https://dns.google/resolve?name=${encodeURIComponent(domain)}&type=${t}`)
          .then(r => r.json())
      )
    );

    results.forEach(res => {
      if (res.status === 'fulfilled' && res.value.Answer) {
        res.value.Answer.forEach(rec => {
          allDnsRecords.push({ type: NUM_TYPE[rec.type] || rec.type, ttl: rec.TTL, value: rec.data });
        });
      }
    });

    if (allDnsRecords.length === 0) {
      el.innerHTML = `<div class="result-card"><div class="status-msg">No DNS records found for <strong>${escHtml(domain)}</strong>.</div></div>`;
      return;
    }

    $('dnsFilters').style.display = 'flex';
    activeDnsFilter = 'ALL';
    document.querySelectorAll('.type-pill').forEach(p => {
      p.classList.toggle('active', p.textContent === 'All');
    });
    renderDNSTable(domain, el);
  } catch(e) {
    showError(el, 'DNS query failed. Check the domain name.');
  }
}

function filterDNS(type) {
  activeDnsFilter = type;
  document.querySelectorAll('.type-pill').forEach(p => {
    p.classList.toggle('active', p.textContent === (type === 'ALL' ? 'All' : type));
  });
  renderDNSTable($('dnsInput').value.trim(), $('dnsResult'));
}

function renderDNSTable(domain, el) {
  const filtered = activeDnsFilter === 'ALL'
    ? allDnsRecords
    : allDnsRecords.filter(r => r.type === activeDnsFilter);

  if (filtered.length === 0) {
    el.innerHTML = `<div class="result-card"><div class="status-msg">No ${escHtml(activeDnsFilter)} records found.</div></div>`;
    return;
  }

  const rows = filtered.map(r => `
    <tr>
      <td>${escHtml(String(r.type))}</td>
      <td>${r.ttl}s</td>
      <td>${escHtml(r.value)}</td>
    </tr>`).join('');

  el.innerHTML = `<div class="result-card">
    <div class="result-card-header"><div class="dot dot-green"></div>DNS Records — ${escHtml(domain)} <span class="badge">${filtered.length} records</span></div>
    <table class="dns-table">
      <thead><tr><th>Type</th><th>TTL</th><th>Value</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

$('dnsInput').addEventListener('keydown', e => e.key === 'Enter' && lookupDNS());

/* ════════════════════════════════════════════════
   REVERSE DNS
════════════════════════════════════════════════ */
async function lookupRDNS() {
  const ip = $('rdnsInput').value.trim();
  if (!ip) return;
  const el = $('rdnsResult');
  showLoading(el);

  try {
    let ptrName;
    if (ip.includes(':')) {
      const expanded = expandIPv6(ip);
      ptrName = expanded.replace(/:/g,'').split('').reverse().join('.') + '.ip6.arpa';
    } else {
      ptrName = ip.split('.').reverse().join('.') + '.in-addr.arpa';
    }

    const [ptrRes, geoRes] = await Promise.allSettled([
      fetch(`https://dns.google/resolve?name=${encodeURIComponent(ptrName)}&type=PTR`).then(r => r.json()),
      geoLookup(ip),
    ]);

    const ptrData  = ptrRes.status === 'fulfilled' ? ptrRes.value : null;
    const geo      = geoRes.status === 'fulfilled' ? geoRes.value : null;
    const hostnames = ptrData?.Answer?.map(a => a.data).filter(Boolean) || [];

    const rows = [
      ['IP Address', ip],
      ['PTR Name',   ptrName],
      ['Hostnames',  hostnames.length
        ? hostnames.map(h => escHtml(h)).join('<br>')
        : '<span style="color:var(--text-dim)">No PTR record found</span>',
        hostnames.length ? 'val-good' : ''],
    ];

    if (geo) {
      const flag = geo.flag?.emoji || flagEmoji(geo.country_code);
      const asn  = geo.connection?.asn ? 'AS' + geo.connection.asn : '—';
      rows.push(
        ['ISP',     geo.connection?.isp || '—'],
        ['Org',     geo.connection?.org || '—'],
        ['Country', geo.country ? `${flag} ${geo.country}` : '—'],
        ['ASN',     asn],
        ['Domain',  geo.connection?.domain || '—'],
      );
    }

    el.innerHTML = dataCard('Reverse DNS — ' + ip, hostnames.length ? 'dot-green' : 'dot-gray', rows);
  } catch(e) {
    showError(el, 'Reverse DNS lookup failed.');
  }
}

function expandIPv6(ip) {
  const parts = ip.split('::');
  const left  = parts[0] ? parts[0].split(':') : [];
  const right = parts[1] ? parts[1].split(':') : [];
  while (left.length + right.length < 8) left.push('0000');
  return [...left, ...right].map(p => p.padStart(4,'0')).join(':');
}

$('rdnsInput').addEventListener('keydown', e => e.key === 'Enter' && lookupRDNS());

/* ════════════════════════════════════════════════
   ASN / WHOIS
════════════════════════════════════════════════ */
async function lookupWhois() {
  const q = $('whoisInput').value.trim();
  if (!q) return;
  const el = $('whoisResult');
  showLoading(el);

  try {
    // ipwho.is accepts IP addresses; for ASN queries we strip "AS" and note the limitation
    const isASN = /^AS\d+$/i.test(q);
    let d;

    if (isASN) {
      // ipwho.is doesn't support ASN-only lookups; use rdap.arin.net as JSON source
      const asnNum = q.replace(/^AS/i, '');
      const r = await fetch(`https://rdap.arin.net/registry/autnum/${asnNum}`, {
        headers: { Accept: 'application/rdap+json' }
      });
      const raw = await r.json();
      // Normalise RDAP response into a display-friendly format
      const name  = raw.name || '—';
      const handle = raw.handle || q.toUpperCase();
      const country = (raw.entities?.[0]?.vcardArray?.[1] || []).find(f => f[0]==='adr')?.[1]?.['country-name'] || '—';
      const notices = (raw.remarks || []).map(rem => rem.description?.join(' ')).filter(Boolean).join(' | ') || '—';
      el.innerHTML = dataCard('ASN Info — ' + handle, 'dot-cyan', [
        ['ASN Handle',   handle],
        ['Name',         name],
        ['Type',         raw.type || '—'],
        ['Country',      country],
        ['Start AS',     raw.startAutnum ?? '—'],
        ['End AS',       raw.endAutnum ?? '—'],
        ['Last Changed', raw.events?.find(e => e.eventAction === 'last changed')?.eventDate?.slice(0,10) || '—'],
        ['Registration', raw.events?.find(e => e.eventAction === 'registration')?.eventDate?.slice(0,10) || '—'],
        ['Remarks',      notices],
      ]);
      return;
    }

    d = await geoLookup(q);
    const flag = d.flag?.emoji || flagEmoji(d.country_code);
    const asn  = d.connection?.asn ? 'AS' + d.connection.asn : '—';

    el.innerHTML = dataCard('Network Info — ' + q, 'dot-cyan', [
      ['Query',        q],
      ['IP',           d.ip],
      ['Type',         d.type || '—'],
      ['ASN',          asn],
      ['ISP',          d.connection?.isp || '—'],
      ['Organisation', d.connection?.org || '—'],
      ['Domain',       d.connection?.domain || '—'],
      ['Country',      d.country ? `${flag} ${d.country} (${d.country_code})` : '—'],
      ['Continent',    d.continent || '—'],
      ['Capital',      d.capital || '—'],
      ['Calling Code', d.calling_code || '—'],
      ['Currency',     d.currency?.name ? `${d.currency.name} (${d.currency.code})` : '—'],
      ['Timezone',     d.timezone?.id || '—'],
      ['UTC Offset',   d.timezone?.utc || '—'],
    ]);
  } catch(e) {
    showError(el, e.message || 'Query failed.');
  }
}

$('whoisInput').addEventListener('keydown', e => e.key === 'Enter' && lookupWhois());

/* ── HELPERS ── */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadMyIP();
